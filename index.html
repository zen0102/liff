<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover">
  <title>Patient Manager PRO</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background-color: #f0f2f5; padding: 20px; font-family: sans-serif; }
    .card { border: none; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
    .profile-section { background: linear-gradient(135deg, #00b900 0%, #009900 100%); padding: 25px; color: white; }
    #pictureUrl { width: 70px; height: 70px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.3); margin-bottom: 10px; }
    .uid-badge { background: rgba(0,0,0,0.2); padding: 4px 10px; border-radius: 12px; font-size: 0.7rem; font-family: monospace; }
    .btn-scan { background-color: #00b900; color: white; font-weight: bold; padding: 15px; border-radius: 12px; width: 100%; border: none; font-size: 1.1rem; }
    .status-box { background: #ffffff; padding: 20px; border-radius: 15px; margin-top: 15px; border: 1px solid #e0e0e0; text-align: left; }
    .form-area { display: none; margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 15px; }
    .data-row { display: flex; justify-content: space-between; font-size: 0.85rem; border-bottom: 1px solid #f2f2f2; padding: 5px 0; }
    .data-label { color: #666; font-weight: bold; }
    .hn-highlight { color: #00b900; font-weight: 800; font-size: 1.4rem; }
    .old-val-box { background: #fff3cd; border: 1px solid #ffeeba; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
  </style>
</head>

<body>
  <div class="container" style="max-width: 450px;">
    <div class="card text-center">
      
      <div id="userInfo" class="profile-section" style="display:none;">
        <img id="pictureUrl" src="" alt="Profile">
        <h5 id="displayName" class="mb-1"></h5>
        <div class="uid-badge">UID: <span id="userIdDisplay">...</span></div>
      </div>

      <div class="card-body p-4">
        <button class="btn-scan mb-3" onclick="scanCode()">📷 สแกนรหัส HN</button>
        <div id="loadingStatus" style="display:none; color: #00b900;" class="fw-bold mb-3">⏳ กำลังทำงาน...</div>

        <div class="status-box">
          <div id="resultArea" style="display:none;">
            <span class="data-label">HN ที่สแกนได้:</span>
            <div id="scanCodeDisplay" class="hn-highlight mb-2">-</div>

            <div id="foundSection" class="form-area">
              <p class="text-success fw-bold">🔎 พบข้อมูลเดิม:</p>
              <div id="patientDetails" class="mb-3"></div>
              
              <div class="old-val-box">
                 <small class="text-muted d-block">วันเวลาเกิดปัจจุบันในระบบ:</small>
                 <strong id="oldBirthDateDisplay">-</strong>
              </div>

              <label class="form-label fw-bold">เลือกวันเวลาเกิดใหม่:</label>
              <input type="datetime-local" id="editBirthDate" class="form-control mb-3">
              <button class="btn btn-success w-100 py-2 fw-bold" onclick="confirmSave()">ยืนยันการแก้ไข</button>
            </div>

            <div id="notFoundSection" class="form-area">
              <p class="text-primary fw-bold">🆕 ไม่พบข้อมูล - ลงทะเบียนใหม่:</p>
              <label class="form-label fw-bold">ระบุวันเวลาเกิด:</label>
              <input type="datetime-local" id="newBirthDate" class="form-control mb-3">
              <button class="btn btn-primary w-100 py-2 fw-bold" onclick="confirmSave()">ยืนยันบันทึกข้อมูล</button>
            </div>
          </div>
        </div>

        <button class="btn btn-link btn-sm mt-3 text-muted text-decoration-none" onclick="liff.closeWindow()">ปิด</button>
      </div>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxPr7lbzOPzaZ0x83PJ4m0VHrkxIUKB7mMH3OHIIxyaBvJiIqVCpMqpN4dwRmg8Grhm/exec"; 
    const LIFF_ID = "2009684330-hseYstha";
    let currentHn = "";
    let oldBirthDate = "";

    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) { getUserProfile(); } else { liff.login(); }
      } catch (err) { console.error(err); }
    }

    async function getUserProfile() {
      const profile = await liff.getProfile();
      document.getElementById("userInfo").style.display = "block";
      document.getElementById("pictureUrl").src = profile.pictureUrl;
      document.getElementById("displayName").innerText = profile.displayName;
      document.getElementById("userIdDisplay").innerText = profile.userId;
    }

    async function scanCode() {
      try {
        const result = await liff.scanCode();
        if (result.value) {
          currentHn = result.value;
          handleSearch(result.value);
        }
      } catch (err) { console.error(err); }
    }

    async function handleSearch(hn) {
      document.getElementById("loadingStatus").style.display = "block";
      document.getElementById("resultArea").style.display = "none";
      document.getElementById("foundSection").style.display = "none";
      document.getElementById("notFoundSection").style.display = "none";

      try {
        const response = await fetch(WEB_APP_URL, {
          method: "POST",
          body: JSON.stringify({ action: "search", hnNumber: hn })
        });
        const res = await response.json();

        document.getElementById("loadingStatus").style.display = "none";
        document.getElementById("resultArea").style.display = "block";
        document.getElementById("scanCodeDisplay").innerText = hn;

        if (res.status === "found") {
          document.getElementById("foundSection").style.display = "block";
          oldBirthDate = res.data["วันเวลาเกิด"] || "ไม่มีข้อมูล";
          document.getElementById("oldBirthDateDisplay").innerText = oldBirthDate;

          let html = "";
          for (let key in res.data) {
            if (res.data[key] && key !== "วันเวลาเกิด") {
              html += `<div class="data-row"><span class="data-label">${key}:</span> <span>${res.data[key]}</span></div>`;
            }
          }
          document.getElementById("patientDetails").innerHTML = html;
        } else {
          document.getElementById("notFoundSection").style.display = "block";
        }
      } catch (e) { alert("Error connecting to server"); }
    }

    async function confirmSave() {
      const isUpdate = document.getElementById("foundSection").style.display === "block";
      const bDate = isUpdate ? document.getElementById("editBirthDate").value : document.getElementById("newBirthDate").value;

      if (!bDate) { alert("กรุณาระบุวันเวลาเกิด"); return; }
      
      const newVal = bDate.replace('T', ' ');
      let confirmMsg = isUpdate 
        ? `⚠️ ยืนยันการเปลี่ยนแปลง\n\n[เดิม]: ${oldBirthDate}\n[ใหม่]: ${newVal}`
        : `ยืนยันบันทึกข้อมูลใหม่\n[วันเวลาเกิด]: ${newVal}`;

      if (!confirm(confirmMsg)) return;

      try {
        document.getElementById("loadingStatus").style.display = "block";
        const response = await fetch(WEB_APP_URL, {
          method: "POST",
          body: JSON.stringify({ action: "save", hnNumber: currentHn, birthDate: bDate })
        });
        const res = await response.json();
        if (res.status === "success") {
          alert("✅ " + res.message);
          location.reload();
        }
      } catch (e) { alert("Error saving data"); }
    }

    main();
  </script>
</body>
</html>
