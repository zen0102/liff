<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Patient Registration</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>
<div class="container" style="max-width:450px;">

  <button id="btnScan" class="btn btn-success w-100 py-3 mt-3">
    📷 สแกนรหัส HN
  </button>

  <div id="loadingStatus" style="display:none;" class="text-success mt-2">
    ⏳ กำลังดำเนินการ...
  </div>

  <div id="resultArea" style="display:none;">
    <h5>HN: <span id="scanCodeDisplay"></span></h5>
    <div id="patientDetails"></div>
  </div>

</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzES5lpNeH2zQy5SZHOeh8ART4dDa0iqxFUhbpWbVnzGYblLKmiOvNDCc0eHUJCMSqN/exec";

let currentHn = "";
let isScanning = false;
let isLiffReady = false;

// ================= INIT =================
async function main() {
  try {
    await liff.init({ liffId: "2009684330-hseYstha" });
    await liff.ready;

    isLiffReady = true;
    console.log("LIFF READY");

  } catch (err) {
    console.error("LIFF ERROR:", err);
  }
}

// ================= SCAN BUTTON (FIX สำคัญ) =================
document.getElementById("btnScan").addEventListener("click", async () => {

  if (!isLiffReady) {
    alert("ระบบยังไม่พร้อม");
    return;
  }

  if (!liff.isInClient()) {
    alert("โปรดเปิดผ่าน LINE");
    return;
  }

  if (isScanning) return; // กันกดรัว

  isScanning = true;
  document.getElementById("loadingStatus").style.display = "block";

  try {
    console.log("START SCAN");

    const result = await liff.scanCode({ scanType: "qr" });

    console.log("SCAN RESULT:", result);

    if (!result || !result.value) {
      alert("สแกนไม่สำเร็จ");
      return;
    }

    currentHn = result.value;
    document.getElementById("scanCodeDisplay").innerText = currentHn;

    await handleSearch(currentHn);

  } catch (err) {
    console.error("SCAN ERROR:", err);
    alert("สแกนล้มเหลว");
  } finally {
    isScanning = false;
    document.getElementById("loadingStatus").style.display = "none";
  }

});

// ================= SEARCH =================
async function handleSearch(hn) {
  try {
    const response = await fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "search",
        hnNumber: hn
      })
    });

    const res = await response.json();

    document.getElementById("resultArea").style.display = "block";

    if (res.status === "found") {
      let html = "<div class='text-success'>พบข้อมูล</div>";
      document.getElementById("patientDetails").innerHTML = html;
    } else {
      document.getElementById("patientDetails").innerHTML =
        "<div class='text-primary'>ไม่พบข้อมูล</div>";
    }

  } catch (e) {
    alert("เชื่อมต่อไม่ได้");
  }
}

// ================= START =================
main();

</script>
</body>
</html>
