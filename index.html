async function insertHN(code) {
  const url = "YOUR_GAS_WEB_APP_URL";

  try {
    console.log("POST to:", url);

    const res = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ code: code })
    });

    console.log("response status:", res.status);

    const text = await res.text();
    console.log("response text:", text);

    const data = JSON.parse(text);

    if (data.status === "success") {
      alert("✅ Saved: " + code);
    } else {
      alert("❌ " + data.message);
    }

  } catch (err) {
    alert("❌ FETCH ERROR: " + err.message);
    console.error("FETCH ERROR:", err);
  }
}







    // 🔥 แก้ scanCode ให้ยิงไป Sheet
    async function scanCode() {
      alert("start scan")

      console.log("isInClient:", liff.isInClient())

      try {
        const result = await liff.scanCode()
        const code = result.value

        document.getElementById("scanCode").innerText = "Code: " + code

        // 👉 insert ลง Google Sheet
        await insertHN(code)

        alert("RESULT: " + code)

      } catch (err) {
        alert("ERROR: " + err.message)
        console.error(err)
      }
    }

    function openWindow() {
      liff.openWindow({
        url: "https://line.me",
        external: true
      })
    }

    function getContext() {
      const ctx = liff.getContext()
      document.getElementById("type").append(ctx.type)
      document.getElementById("viewType").append(ctx.viewType)
      document.getElementById("utouId").append(ctx.utouId)
      document.getElementById("roomId").append(ctx.roomId)
      document.getElementById("groupId").append(ctx.groupId)
    }

    async function getUserProfile() {
      const profile = await liff.getProfile()
      document.getElementById("pictureUrl").src = profile.pictureUrl
      document.getElementById("userId").append(profile.userId)
      document.getElementById("statusMessage").append(profile.statusMessage)
      document.getElementById("displayName").append(profile.displayName)

      const idToken = liff.getDecodedIDToken()
      if (idToken) {
        document.getElementById("decodedIDToken").append(idToken.email || "")
      }
    }

    function getEnvironment() {
      document.getElementById("os").append(liff.getOS())
      document.getElementById("language").append(liff.getLanguage())
      document.getElementById("version").append(liff.getVersion())
      document.getElementById("accessToken").append(liff.getAccessToken())
      document.getElementById("isInClient").append(liff.isInClient())
    }

    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID })

        document.getElementById("isLoggedIn").append(liff.isLoggedIn())

        if (!liff.isLoggedIn()) {
          liff.login()
          return
        }

        getEnvironment()
        await getUserProfile()
        getContext()

      } catch (err) {
        alert("LIFF init error: " + err.message)
        console.error(err)
      }
    }

    main()
  </script>
