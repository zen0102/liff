<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover">
  <title>My LIFF app</title>
  <link rel="stylesheet" href="css/style.css" media="all">
  <style>
    button { width: 100%; padding: 15px; margin: 10px 0; font-size: 18px; cursor: pointer; }
    img { max-width: 100px; border-radius: 50%; }
    b { color: #333; }
  </style>
</head>

<body>
  <h2>Patient Scanner</h2>
  <div id="profile" style="display:none;">
    <img id="pictureUrl">
    <p id="displayName"></p>
  </div>
  
  <hr>
  <p id="scanCode"><b>Code:</b> - </p>
  <p id="isLoggedIn"><b>isLoggedIn:</b> </p>

  <button id="btnScanCode" onclick="scanCode()" style="background-color: #00b900; color: white;">Scan Code</button>
  <button id="btnClose" onclick="closed()">Close</button>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <script>
    // *** นำ URL จาก Google Apps Script มาใส่ตรงนี้ ***
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwV7ZHMj7QP34TRC4u2EwNeN16nnnFcGNyAoUzF1c9wocA5piF8zu0QzDbJAdMc2nJN/exec";

    async function scanCode() {
      if (!liff.isInClient()) {
        alert("กรุณาเปิดในแอป LINE เท่านั้น");
        return;
      }

      try {
        const result = await liff.scanCode();
        const hnCode = result.value;

        if (hnCode) {
          document.getElementById("scanCode").innerText = "Code: " + hnCode;
          
          // ส่งข้อมูลไปที่ Google Sheets
          const response = await fetch(WEB_APP_URL, {
            method: "POST",
            body: JSON.stringify({ hnNumber: hnCode }),
          });

          const resData = await response.json();
          if (resData.result === "success") {
            alert("✅ บันทึกข้อมูล HN: " + hnCode + " สำเร็จ!");
          } else {
            alert("❌ บันทึกไม่สำเร็จ: " + resData.message);
          }
        }
      } catch (err) {
        // กรณีผู้ใช้กดยกเลิกการสแกน หรือเกิด Error
        if (err.message !== "User cancelled the scan.") {
          alert("ERROR: " + err.message);
        }
      }
    }

    function closed() {
      liff.closeWindow();
    }

    async function getUserProfile() {
      const profile = await liff.getProfile();
      document.getElementById("profile").style.display = "block";
      document.getElementById("pictureUrl").src = profile.pictureUrl;
      document.getElementById("displayName").innerText = "สวัสดีคุณ " + profile.displayName;
    }

    async function main() {
      await liff.init({ liffId: "2009684330-hseYstha" });

      if (liff.isLoggedIn()) {
        document.getElementById("isLoggedIn").append("Yes");
        await getUserProfile();
      } else {
        liff.login();
      }
    }

    main();
  </script>
</body>
</html>
